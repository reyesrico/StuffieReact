<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging in…</title>
</head>
<body>
  <script>
    (function () {
      var hash   = window.location.hash.slice(1);   // strip leading '#'
      var params = new URLSearchParams(hash);

      var accessToken = params.get('access_token');
      var error       = params.get('error')        ||
                        params.get('error_reason')  ||
                        params.get('error_description');

      // Use localStorage instead of window.opener.postMessage.
      // Facebook sets COOP: same-origin on their pages, which severs
      // window.opener when the popup navigates to facebook.com.
      // The storage event is fired in the opener window without needing
      // a direct opener reference, bypassing COOP entirely.
      var result = accessToken
        ? JSON.stringify({ type: 'fb_oauth_success', access_token: accessToken, ts: Date.now() })
        : JSON.stringify({ type: 'fb_oauth_error',   error: error || 'Login cancelled',   ts: Date.now() });

      try { localStorage.setItem('fb_oauth_result', result); } catch (e) {}

      window.close();
    })();
  </script>
</body>
</html>
